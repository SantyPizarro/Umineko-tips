<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Umineko</title>

  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/theme-umineko.css" />
</head>
<body>

  <div id="app">

    <header id="app-header">
      <h1 id="game-title">Umineko: When They Cry</h1>
    </header>


<main id="main-layout">

  <aside id="left-panel">

<div id="characters-selector">
    <div id="selector-container"></div>
    <button id="btn-fantasy-next" class="fantasy-next-btn hidden">NEXT</button>
  </div>

    <nav id="side-menu">
      <button id="btn-tips" class="menu-btn">Tips</button>
      <button id="btn-execute" class="menu-btn">Execute</button>
      <button id="btn-resurrect" class="menu-btn">Resurrect</button>
    </nav>

  </aside>


  <section id="center-panel">

    <div id="info-panel">

      <h2 id="character-name"></h2>

      <div id="text-container">
          <div id="character-text"></div>
      </div>

      <div id="text-controls">
          <button id="text-back-btn">Back</button>
          <button id="text-next-btn">Next</button>
      </div>

  </section>


  <section id="character-visual">
    <img id="character-image" src="" alt="Character Full Art" />
  </section>

</main>


    <footer id="app-footer">

      <div id="episode-selector">
        <button class="episode-btn" data-ep="1">Ep 1</button>
        <button class="episode-btn" data-ep="2">Ep 2</button>
        <button class="episode-btn" data-ep="3">Ep 3</button>
        <button class="episode-btn" data-ep="4">Ep 4</button>
      </div>

      <div id="music-player">
        <button id="music-toggle">Play</button>
        <input 
          type="range" 
          id="volume-control" 
          min="0" 
          max="1" 
          step="0.01" 
          value="0.5" 
        />
        <audio id="bgm" loop>
          <source src="assets/music/ep1-theme.mp3" type="audio/mpeg">
        </audio>
      </div>

    </footer>

  </div>

  <script src="js/main.js" type="module"></script>
</body>
</html>
